<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>夜遊天国</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111;
      padding: 60px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    /* 搜索框 */
    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 50px;
    }

    .search input {
      width: 100%;
      max-width: 600px;
      padding: 16px 20px;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #f5f5f5;
      font-size: 16px;
      outline: none;
      transition: all 0.2s ease;
    }

    .search input:focus {
      border-color: #111;
      background: #fff;
    }

    /* 分类 */
    .section {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 14px;
      color: #888;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    /* 卡片 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      text-decoration: none;
      color: #111;
      transition: all 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #111;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

  </style>
</head>

<body>

  <div class="container">

    <!-- 搜索 -->
    <div class="search">
      <input id="searchInput" type="text" placeholder="Search..." />
    </div>

    <!-- AI -->
    <div class="section">
      <div class="section-title">AI</div>
      <div class="grid">
        <a class="card" href="https://chatgpt.com" target="_blank" data-keywords="ai chatgpt 写作">
          <h3>ChatGPT</h3>
          <p>AI 对话与写作</p>
        </a>

        <a class="card" href="https://claude.ai" target="_blank" data-keywords="ai claude">
          <h3>Claude</h3>
          <p>长文本处理</p>
        </a>
      </div>
    </div>

    <!-- 设计 -->
    <div class="section">
      <div class="section-title">Design</div>
      <div class="grid">
        <a class="card" href="https://www.figma.com" target="_blank" data-keywords="figma 设计">
          <h3>Figma</h3>
          <p>UI / 原型设计</p>
        </a>

        <a class="card" href="https://www.canva.com" target="_blank" data-keywords="canva">
          <h3>Canva</h3>
          <p>海报与封面</p>
        </a>
      </div>
    </div>

    <!-- 工具 -->
    <div class="section">
      <div class="section-title">Tools</div>
      <div class="grid">
        <a class="card" href="https://www.notion.so" target="_blank" data-keywords="notion">
          <h3>Notion</h3>
          <p>笔记与知识库</p>
        </a>

        <a class="card" href="https://translate.google.com" target="_blank" data-keywords="翻译">
          <h3>Google Translate</h3>
          <p>翻译工具</p>
        </a>
      </div>
    </div>

  </div>

  <script>
    const input = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".card");

    input.addEventListener("input", function () {
      const keyword = this.value.toLowerCase().trim();

      cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        const keywords = card.dataset.keywords.toLowerCase();

        if (!keyword || text.includes(keyword) || keywords.includes(keyword)) {
          card.classList.remove("hidden");
        } else {
          card.classList.add("hidden");
        }
      });
    });
  </script>

</body>
</html>
