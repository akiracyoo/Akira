<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的导航网页</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #fff;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 20px;
    }
    h1 {
      text-align: center;
      font-size: 40px;
      margin-bottom: 12px;
    }
    .desc {
      text-align: center;
      color: #9aa3af;
      margin-bottom: 32px;
    }
    .search {
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }
    .search input {
      width: 100%;
      max-width: 620px;
      padding: 15px 18px;
      border: none;
      border-radius: 16px;
      background: #1a1f29;
      color: #fff;
      font-size: 16px;
      outline: none;
    }
    .section {
      margin-bottom: 32px;
    }
    .section h2 {
      margin-bottom: 14px;
      font-size: 22px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      display: block;
      text-decoration: none;
      color: #fff;
      background: #171b24;
      border: 1px solid #252b36;
      border-radius: 18px;
      padding: 18px;
      transition: all .2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #4c8dff;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    .card p {
      margin: 0;
      color: #9aa3af;
      font-size: 14px;
      line-height: 1.6;
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>我的导航网页</h1>
    <p class="desc">常用网站收藏夹</p>

    <div class="search">
      <input id="searchInput" type="text" placeholder="搜索网站">
    </div>

    <div class="section">
      <h2>AI 工具</h2>
      <div class="grid">
        <a class="card" href="https://chatgpt.com" target="_blank" data-keywords="ai chatgpt 写作 对话">
          <h3>ChatGPT</h3>
          <p>AI 对话、写作、总结、灵感生成。</p>
        </a>
        <a class="card" href="https://claude.ai" target="_blank" data-keywords="ai claude 长文本">
          <h3>Claude</h3>
          <p>适合长文本整理和写作辅助。</p>
        </a>
      </div>
    </div>

    <div class="section">
      <h2>设计工具</h2>
      <div class="grid">
        <a class="card" href="https://www.figma.com" target="_blank" data-keywords="figma ui 设计 原型">
          <h3>Figma</h3>
          <p>界面设计、原型协作。</p>
        </a>
        <a class="card" href="https://www.canva.com" target="_blank" data-keywords="canva 海报 封面">
          <h3>Canva</h3>
          <p>适合做封面、海报和图文。</p>
        </a>
      </div>
    </div>

    <div class="section">
      <h2>效率工具</h2>
      <div class="grid">
        <a class="card" href="https://www.notion.so" target="_blank" data-keywords="notion 笔记 文档">
          <h3>Notion</h3>
          <p>笔记、知识库、项目管理。</p>
        </a>
        <a class="card" href="https://translate.google.com/" target="_blank" data-keywords="翻译 google translate">
          <h3>Google 翻译</h3>
          <p>快速翻译和跨语言搜索。</p>
        </a>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".card");

    input.addEventListener("input", function () {
      const keyword = this.value.toLowerCase().trim();

      cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        const keywords = (card.dataset.keywords || "").toLowerCase();

        if (!keyword || text.includes(keyword) || keywords.includes(keyword)) {
          card.classList.remove("hidden");
        } else {
          card.classList.add("hidden");
        }
      });
    });
  </script>
</body>
</html>
