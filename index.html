<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #ffffff;
  color: #111;
}

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 20px;
}

h1 {
  text-align: center;
  font-size: 40px;
  margin-bottom: 12px;
}

.desc {
  text-align: center;
  color: #666;
  margin-bottom: 32px;
}

.search input {
  width: 100%;
  max-width: 620px;
  padding: 15px 18px;
  border-radius: 16px;
  border: 1px solid #e5e7eb;
  background: #f3f4f6;
  color: #111;
}

.section {
  margin-bottom: 32px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 18px;
  padding: 18px;
  text-decoration: none;
  color: #111;
  transition: all .2s ease;
}

.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
}

.card p {
  color: #666;
