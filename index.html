<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>夜遊天国</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #111111;
      padding: 56px 20px;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
    }

    .search {
      margin-bottom: 40px;
      display: flex;
      justify-content: center;
    }

    .search input {
      width: 100%;
      max-width: 620px;
      height: 52px;
      padding: 0 18px;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      background: #f7f7f8;
      color: #111111;
      font-size: 16px;
      outline: none;
      transition: 0.2s ease;
    }

    .search input:focus {
      background: #ffffff;
      border-color: #111111;
    }

    .section {
      margin-bottom: 34px;
    }

    .section-title {
      font-size: 13px;
      color: #888888;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      display: block;
      text-decoration: none;
      color: #111111;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 18px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #111111;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.08);
    }

    .card h3 {
      font-size: 16px;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .card p {
      font-size: 13px;
      color: #666666;
      line-height: 1.5;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 28px 14px;
      }

      .search {
        margin-bottom: 28px;
      }

      .search input {
        height: 48px;
        border-radius: 14px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="search">
      <input id="searchInput" type="text" placeholder="Search..." />
    </div>

    <div class="section">
      <div class="section-title">AI</div>
      <div class="grid">
        <a class="card" href="https://chatgpt.com" target="_blank" data-keywords="ai chatgpt 写作 对话">
          <h3>ChatGPT</h3>
          <p>AI 对话与写作</p>
        </a>
        <a class="card" href="https://claude.ai" target="_blank" data-keywords="ai claude 长文本">
          <h3>Claude</h3>
          <p>长文本处理</p>
        </a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Design</div>
      <div class="grid">
        <a class="card" href="https://www.figma.com" target="_blank" data-keywords="figma 设计 ui 原型">
          <h3>Figma</h3>
          <p>UI / 原型设计</p>
        </a>
        <a class="card" href="https://www.canva.com" target="_blank" data-keywords="canva 海报 封面">
          <h3>Canva</h3>
          <p>海报与封面</p>
        </a>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Tools</div>
      <div class="grid">
        <a class="card" href="https://www.notion.so" target="_blank" data-keywords="notion 笔记 文档">
          <h3>Notion</h3>
          <p>笔记与知识库</p>
        </a>
        <a class="card" href="https://translate.google.com" target="_blank" data-keywords="google translate 翻译">
          <h3>Google Translate</h3>
          <p>翻译工具</p>
        </a>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("searchInput");
    const cards = document.querySelectorAll(".card");

    input.addEventListener("input", function () {
      const keyword = this.value.toLowerCase().trim();

      cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        const keywords = (card.dataset.keywords || "").toLowerCase();

        if (!keyword || text.includes(keyword) || keywords.includes(keyword)) {
          card.classList.remove("hidden");
        } else {
          card.classList.add("hidden");
        }
      });
    });
  </script>
</body>
</html>
