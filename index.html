<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜遊天國</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #ffffff;
  color: #000;
}

/* 容器 */
.container {
  max-width: 1000px;
  margin: 80px auto;
  padding: 0 20px;
}

/* 分类 */
.category {
  margin-bottom: 50px;
}

.category-title {
  font-size: 13px;
  color: #999;
  margin-bottom: 15px;
  letter-spacing: 2px;
}

/* 网格 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 12px;
}

/* 卡片 */
.card {
  display: block;
  padding: 16px;
  border-radius: 12px;
  text-decoration: none;
  color: #000;
  background: #f5f5f5;
  transition: all 0.2s ease;
  font-size: 14px;
}

.card:hover {
  background: #eaeaea;
  transform: translateY(-2px);
}
</style>
</head>

<body>

<div class="container" id="app"></div>

<script>
fetch("data.json")
  .then(res => {
    if (!res.ok) throw new Error("data.json 加载失败");
    return res.json();
  })
  .then(data => {
    const app = document.getElementById("app");

    data.forEach(category => {
      const div = document.createElement("div");
      div.className = "category";

      div.innerHTML = `
        <div class="category-title">${category.name}</div>
        <div class="grid">
          ${category.links.map(link => `
            <a class="card" href="${link.url}" target="_blank" rel="noopener noreferrer">
              ${link.title}
            </a>
          `).join("")}
        </div>
      `;

      app.appendChild(div);
    });
  })
  .catch(err => {
    document.getElementById("app").innerHTML = `
      <div style="padding:40px;font-size:16px;color:#000;">
        数据加载失败：请检查 data.json 格式是否正确
      </div>
    `;
    console.error(err);
  });
</script>

</body>
</html>
