<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Talk</title>

<style>
body {
  background:#fff;
  color:#111;
  font-family:-apple-system;
  max-width:720px;
  margin:40px auto;
}

textarea {
  width:100%;
  height:120px;
  border:1px solid #ddd;
  padding:10px;
}

button {
  margin-top:10px;
  padding:8px 16px;
  background:#111;
  color:#fff;
  border:none;
}

.post {
  border-bottom:1px solid #eee;
  padding:12px 0;
}
</style>
</head>

<body>

<h2>Talk</h2>

<textarea id="input"></textarea>
<button onclick="post()">发布</button>

<div id="list"></div>

<script>

// ⚠️ 改这里
const repo = "akiracyoo/Akira";
const token = "你的GitHub Token"; // 必填

async function load() {
  const res = await fetch(`https://raw.githubusercontent.com/${repo}/main/talk.json`);
  const data = await res.json();

  document.getElementById("list").innerHTML =
    data.reverse().map(i => `
      <div class="post">
        <div>${i.time}</div>
        <div>${i.text}</div>
      </div>
    `).join("");
}

async function post() {
  const text = document.getElementById("input").value.trim();
  if (!text) return;

  const res = await fetch(`https://api.github.com/repos/${repo}/contents/talk.json`);
  const file = await res.json();

  const content = JSON.parse(atob(file.content));

  content.push({
    text,
    time: new Date().toLocaleString()
  });

  await fetch(`https://api.github.com/repos/${repo}/contents/talk.json`, {
    method: "PUT",
    headers: {
      "Authorization": `token ${token}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: "update talk",
      content: btoa(JSON.stringify(content, null, 2)),
      sha: file.sha
    })
  });

  document.getElementById("input").value = "";
  load();
}

load();

</script>

</body>
</html>
