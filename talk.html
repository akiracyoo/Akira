<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talk</title>

<style>
body {
  margin: 0;
  background: #fff;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont;
}

.topbar {
  height: 56px;
  border-bottom: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}

.container {
  max-width: 720px;
  margin: 0 auto;
  padding: 20px;
}

textarea {
  width: 100%;
  height: 120px;
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 12px;
}

button {
  margin-top: 10px;
  padding: 8px 16px;
  border: none;
  background: #111;
  color: #fff;
  border-radius: 999px;
  cursor: pointer;
}

.post {
  border-bottom: 1px solid #eee;
  padding: 16px 0;
}

.time {
  font-size: 12px;
  color: #888;
}

</style>
</head>

<body>

<div class="topbar">
  <div>Talk</div>
  <a href="./index.html">返回</a>
</div>

<div class="container">

  <textarea id="input" placeholder="写点什么..."></textarea>
  <button onclick="publish()">发布</button>

  <div id="status"></div>

  <div id="list"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// ⚠️ 你的 Supabase
const url = "https://ellfewcyczznuczruggc.supabase.co";
const key = "sb_publishable_KoFk1TQNGj-8z1yCOB35mw_vyP6GfYK";

let supabase = null;

try {
  supabase = window.supabase.createClient(url, key);
} catch (e) {
  console.log("Supabase 未初始化");
}

// 渲染
async function load() {
  const list = document.getElementById("list");

  if (!supabase) {
    list.innerHTML = "未连接数据库";
    return;
  }

  try {
    const { data, error } = await supabase
      .from("talk_posts")
      .select("*")
      .order("created_at", { ascending: false });

    if (error) throw error;

    if (!data.length) {
      list.innerHTML = "还没有内容";
      return;
    }

    list.innerHTML = data.map(i => `
      <div class="post">
        <div class="time">${new Date(i.created_at).toLocaleString()}</div>
        <div>${i.content}</div>
      </div>
    `).join("");

  } catch (err) {
    list.innerHTML = "加载失败（数据库未配置）";
  }
}

// 发布
async function publish() {
  const input = document.getElementById("input");
  const status = document.getElementById("status");

  const text = input.value.trim();
  if (!text) return;

  if (!supabase) {
    status.innerText = "未连接数据库";
    return;
  }

  status.innerText = "发布中...";

  try {
    const { error } = await supabase.from("talk_posts").insert({
      content: text
    });

    if (error) throw error;

    input.value = "";
    status.innerText = "已发布";

    load();

  } catch (err) {
    status.innerText = "发布失败";
  }
}

load();

</script>

</body>
</html>
