<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Talk</title>

<style>
body {
  max-width:700px;
  margin:40px auto;
  background:#fff;
  color:#111;
  font-family:-apple-system;
}
.post {
  border-bottom:1px solid #eee;
  padding:12px 0;
}
.time {
  font-size:12px;
  color:#888;
}
</style>

</head>

<body>

<h2>Talk</h2>

<div id="list">加载中...</div>

<script>

fetch("./talk.json")   // ⚠️ 用本地路径
.then(res => res.json())
.then(data => {

  if (!data.length) {
    document.getElementById("list").innerHTML = "还没有内容";
    return;
  }

  document.getElementById("list").innerHTML =
    data.slice().reverse().map(i => `
      <div class="post">
        <div class="time">${i.time}</div>
        <div>${i.text}</div>
      </div>
    `).join("");

})
.catch(() => {
  document.getElementById("list").innerHTML = "加载失败";
});

</script>

</body>
</html>
