<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Talk</title>

<style>
body {
  background: #fff;
  color: #111;
  font-family: -apple-system, BlinkMacSystemFont;
  max-width: 720px;
  margin: 60px auto;
}

h2 {
  font-weight: 500;
}

textarea {
  width: 100%;
  height: 120px;
  border: 1px solid #ddd;
  padding: 10px;
  font-size: 14px;
}

button {
  margin-top: 10px;
  padding: 6px 14px;
  border: 1px solid #111;
  background: #111;
  color: #fff;
  cursor: pointer;
}

.post {
  border-top: 1px solid #eee;
  padding: 14px 0;
}

.time {
  font-size: 12px;
  color: #888;
  margin-bottom: 4px;
}
</style>
</head>

<body>

<h2>Talk</h2>

<textarea id="input" placeholder="写点什么..."></textarea>
<button onclick="publish()">发布</button>

<div id="status"></div>
<div id="list"></div>

<script>
const repo = "akiracyoo/Akira";
const token = "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";

function publish() {
  const text = document.getElementById("input").value.trim();
  if (!text) return;

  document.getElementById("status").innerText = "发布中...";

  fetch(`https://api.github.com/repos/${repo}/actions/workflows/talk.yml/dispatches`, {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer " + token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: { text }
    })
  }).then(() => {
    document.getElementById("status").innerText = "已发布（稍等刷新）";
    document.getElementById("input").value = "";
    setTimeout(load, 2000);
  });
}

function load() {
  fetch("./posts.json?" + Date.now())
    .then(res => res.json())
    .then(data => {
      document.getElementById("list").innerHTML =
        data.map(i => `
          <div class="post">
            <div class="time">${i.time}</div>
            <div>${i.text}</div>
          </div>
        `).join("");
    });
}

load();
</script>

</body>
</html>
