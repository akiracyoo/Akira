<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AKIRA</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #ffffff;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }

    .topbar {
      position: sticky;
      top: 0;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #eeeeee;
      z-index: 10;
    }

    .topbar-inner {
      max-width: 760px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 14px;
      color: #666666;
    }

    .nav a:hover {
      color: #111111;
    }

    .hero {
      padding: 26px 0 18px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 10px;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .hero-desc {
      font-size: 14px;
      line-height: 1.8;
      color: #666666;
    }

    .composer {
      padding: 20px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .composer-box {
      width: 100%;
      min-height: 110px;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.8;
      resize: vertical;
      outline: none;
      color: #111111;
      background: #ffffff;
    }

    .composer-box:focus {
      border-color: #cfcfcf;
    }

    .composer-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
    }

    .btn {
      appearance: none;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .btn:hover {
      opacity: 0.88;
    }

    .timeline {
      margin-top: 8px;
    }

    .post {
      padding: 22px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .post-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .post-user {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .post-name {
      font-size: 15px;
      font-weight: 700;
    }

    .post-meta {
      font-size: 12px;
      color: #888888;
    }

    .post-content {
      font-size: 16px;
      line-height: 1.95;
      white-space: pre-wrap;
      word-break: break-word;
      color: #111111;
    }

    .post-actions {
      display: flex;
      gap: 18px;
      margin-top: 14px;
      font-size: 13px;
      color: #777777;
    }

    .post-actions span {
      cursor: default;
    }

    .footer {
      padding-top: 28px;
      font-size: 12px;
      color: #999999;
      text-align: center;
    }

    @media (max-width: 640px) {
      .hero-title {
        font-size: 24px;
      }

      .post-content {
        font-size: 15px;
      }

      .nav {
        gap: 12px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">夜遊天 · 动态</div>
      <div class="nav">
        <a href="./index.html">返回首页</a>
      </div>
    </div>
  </div>

  <main class="page">
    <section class="hero">
    </section>

    <section class="composer">
      <textarea
        id="composer"
        class="composer-box"
        placeholder="写点什么。比如一句观点、一个瞬间、一条短评。"
      ></textarea>
      <div class="composer-actions">
        <button id="publishBtn" class="btn">发布</button>
      </div>
    </section>

    <section class="timeline" id="timeline"></section>

    <div class="footer">夜遊天 · Minimal Feed</div>
  </main>

  <script>
    const STORAGE_KEY = "akira_minifeed_posts_v1";


    const composer = document.getElementById("composer");
    const publishBtn = document.getElementById("publishBtn");
    const clearBtn = document.getElementById("clearBtn");
    const timeline = document.getElementById("timeline");

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function loadPosts() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultPosts;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) && parsed.length ? parsed : defaultPosts;
      } catch (e) {
        return defaultPosts;
      }
    }

    function savePosts(posts) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    }

    function nowString() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const h = String(d.getHours()).padStart(2, "0");
      const min = String(d.getMinutes()).padStart(2, "0");
      return `${y}-${m}-${day} ${h}:${min}`;
    }

    function render() {
      const posts = loadPosts();

      timeline.innerHTML = posts
        .slice()
        .reverse()
        .map(
          (post) => `
            <article class="post">
              <div class="post-head">
                <div class="post-user">
                  <div class="post-name">${escapeHtml(post.author)}</div>
                  <div class="post-meta">${escapeHtml(post.time)}</div>
                </div>
              </div>
              <div class="post-content">${escapeHtml(post.content)}</div>
              <div class="post-actions">
                <span>♡ 喜欢</span>
                <span>↻ 转发</span>
                <span>◦ 评论</span>
              </div>
            </article>
          `
        )
        .join("");
    }

    publishBtn.addEventListener("click", () => {
      const content = composer.value.trim();
      if (!content) {
        alert("先写点内容。");
        return;
      }

      const posts = loadPosts();
      posts.push({
        id: Date.now(),
        author: "夜遊",
        time: nowString(),
        content
      });

      savePosts(posts);
      composer.value = "";
      render();
    });

    render();
  </script>
</body>
</html>
