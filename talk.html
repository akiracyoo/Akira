<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Talk</title>

<style>
body {
  max-width:700px;
  margin:40px auto;
  background:#fff;
  color:#111;
  font-family:-apple-system;
}
textarea {
  width:100%;
  height:120px;
  border:1px solid #ddd;
  padding:10px;
}
button {
  margin-top:10px;
  padding:8px 16px;
  background:#111;
  color:#fff;
  border:none;
}
.post {
  border-bottom:1px solid #eee;
  padding:12px 0;
}
.time {
  font-size:12px;
  color:#888;
}
</style>

</head>

<body>

<h2>Talk</h2>

<textarea id="input"></textarea>
<button onclick="publish()">发布</button>

<div id="status"></div>
<div id="list"></div>

<script>

// ⚠️ 改成你的仓库
const repo = "akiracyoo/Akira";

// ⚠️ 你的 GitHub 用户名
const user = "akiracyoo";

// ⚠️ 你自己设一个简单密码
const password = "123456";

function publish() {
  const text = document.getElementById("input").value.trim();
  if (!text) return;

  const pass = prompt("输入密码");
  if (pass !== password) {
    alert("密码错误");
    return;
  }

  document.getElementById("status").innerText = "发布中...";

  fetch(`https://api.github.com/repos/${repo}/actions/workflows/talk.yml/dispatches`, {
    method: "POST",
    headers: {
      "Accept": "application/vnd.github+json",
      "Authorization": "Bearer YOUR_TOKEN",  // ⚠️ 这里要换
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      ref: "main",
      inputs: { text }
    })
  }).then(() => {
    document.getElementById("status").innerText = "已发布（稍等刷新）";
    document.getElementById("input").value = "";
  });
}

// 读取内容
fetch("./talk.json")
.then(res => res.json())
.then(data => {
  document.getElementById("list").innerHTML =
    data.reverse().map(i => `
      <div class="post">
        <div class="time">${i.time}</div>
        <div>${i.text}</div>
      </div>
    `).join("");
});

</script>

</body>
</html>
